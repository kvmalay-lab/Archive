<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A personal aesthetic archive — a curated collection of timeless pieces organized by intention.">
<meta name="theme-color" content="#0a0a0a">
<title>The Aesthetic Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="topnav" aria-label="Main navigation">
    <button class="logo" id="logo" type="button" title="Go to home">The Archive</button>
    <div class="nav-links" id="nav-links"></div>
    <input class="search-input" id="search-input" type="search" placeholder="Search archive..." aria-label="Search the archive">
  </nav>

  <main class="shell" id="app-root"></main>

  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div id="modal-container"></div>
  </div>

  <script src="js/data-bundle.js"></script>
  <script src="js/data.js"></script>
  <script src="js/search.js"></script>
  <script src="js/render.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('logo').addEventListener('click', () => Router.go('/'));
  </script>
</body>
</html>
